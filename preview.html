<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Portal - Live Preview</title>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

    :root {
      --bg-color: #f8f9fa;
      --panel-bg: #ffffff;
      --panel-border: #dadce0;
      --text-main: #202124;
      --text-muted: #5f6368;
      --primary: #1a73e8;
      --primary-hover: #174ea6;
      --success: #188038;
      --success-bg: #e6f4ea;
      --danger: #d93025;
      --danger-bg: #fce8e6;
      
      --shadow-sm: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
      --shadow-md: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .google-card { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 8px; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s; }
    .google-card:hover { box-shadow: var(--shadow-md); }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Login Styles */
    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card { width: 100%; max-width: 420px; padding: 40px; text-align: center; }
    .brand { margin-bottom: 30px; }
    .logo-wrapper { color: var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 40px; }
    .input-group { position: relative; display: flex; align-items: center; margin-bottom: 20px; }
    .input-icon { position: absolute; left: 16px; color: var(--text-muted); }
    .input-group input { width: 100%; border: 1px solid var(--panel-border); padding: 14px 16px 14px 48px; border-radius: 4px; font-size: 16px; outline: none; }
    .input-group input:focus { border-color: var(--primary); border-width: 2px; padding-left: 47px; }
    .btn-primary { width: 100%; background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; text-transform: uppercase; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); box-shadow: var(--shadow-sm); }
    .error-message { background: var(--danger-bg); color: var(--danger); padding: 12px; border-radius: 4px; text-align: left; margin-bottom: 15px; }

    /* Dashboard Styles */
    .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; margin-bottom: 24px; background: #ffffff; border-bottom: 1px solid var(--panel-border); }
    .search-container { position: relative; flex: 1; max-width: 600px; margin: 0 40px; }
    .search-input { width: 100%; padding: 12px 16px 12px 48px; border-radius: 24px; border: 1px solid transparent; background: #f1f3f4; font-size: 16px; outline: none; }
    .search-input:focus { background: #ffffff; border-color: var(--panel-border); box-shadow: var(--shadow-md); }
    .search-results { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: #ffffff; border-radius: 8px; box-shadow: var(--shadow-md); border: 1px solid var(--panel-border); max-height: 300px; overflow-y: auto; z-index: 10; }
    .search-result-item { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f3f4; }
    .search-result-item:hover { background: #f8f9fa; }
    
    .profile-header { display: flex; align-items: center; gap: 24px; padding: 24px; margin-bottom: 24px; }
    .avatar { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; }
    
    .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; }
    .stat-card { padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 16px;}
    .stat-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    
    .marks-column { padding: 24px; }
    .marks-table { width: 100%; border-collapse: collapse; text-align: left; }
    .marks-table th { padding: 12px 16px; border-bottom: 2px solid var(--panel-border); color: var(--text-muted); }
    .marks-table td { padding: 12px 16px; border-bottom: 1px solid #f1f3f4; }
    
    .status-pill { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; display: inline-block; }
    .status-pill.pass { background: var(--success-bg); color: var(--success); }
    .status-pill.fail { background: var(--danger-bg); color: var(--danger); }
    
    .progress-bar-bg { width: 100px; height: 6px; background: #e8eaed; border-radius: 3px; display: inline-block; margin-left: 12px; vertical-align: middle; }
    .progress-bar-fill { height: 100%; border-radius: 3px; }
    .warning-flash { display: inline-block; margin-top: 8px; color: var(--danger); font-size: 13px; font-weight: 500; padding: 4px 8px; background: var(--danger-bg); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Login = ({ onLogin }) => {
      const [studentId, setStudentId] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setIsLoading(true);

        try {
          const response = await fetch('http://localhost:5000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ student_id: studentId, password: password }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Login failed');
          
          localStorage.setItem('student_id', data.student_id);
          onLogin();
        } catch (err) {
          setError(err.message);
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="login-container fade-in">
          <div className="google-card login-card">
            <div className="brand">
              <div className="logo-wrapper">🎓</div>
              <h1>Student Portal</h1>
              <p>Sign in to view your academic report</p>
            </div>
            <form onSubmit={handleSubmit}>
              {error && <div className="error-message">⚠️ {error}</div>}
              <div className="input-group">
                <span className="input-icon">👤</span>
                <input type="text" placeholder="Student ID (e.g. STU001)" value={studentId} onChange={e => setStudentId(e.target.value)} required />
              </div>
              <div className="input-group">
                <span className="input-icon">🔒</span>
                <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} required />
              </div>
              <button type="submit" className="btn-primary" disabled={isLoading}>
                {isLoading ? 'Authenticating...' : 'Secure Login'}
              </button>
            </form>
          </div>
        </div>
      );
    };

    const Navbar = ({ searchQuery, setSearchQuery, searchResults, onResultClick, onLogout }) => (
      <nav className="navbar fade-in">
        <h2 style={{color: 'var(--text-muted)'}}><span style={{color:'var(--primary)'}}>G</span> Academic</h2>
        <div className="search-container">
          <span style={{position:'absolute', left:'16px', top:'50%', transform:'translateY(-50%)'}}>🔍</span>
          <input type="text" className="search-input" placeholder="Search students by name..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
          {searchResults.length > 0 && (
            <div className="search-results fade-in">
              {searchResults.map(s => (
                <div key={s.student_id} className="search-result-item" onClick={() => onResultClick(s.student_id)}>
                  <div><strong>{s.full_name}</strong> <span style={{fontSize:'12px', color:'var(--text-muted)'}}>{s.student_id}</span></div>
                  <div className={`status-pill ${s.percentage >= 40 ? 'pass' : 'fail'}`}>{s.percentage}%</div>
                </div>
              ))}
            </div>
          )}
        </div>
        <button onClick={onLogout} style={{background:'transparent', border:'1px solid var(--panel-border)', padding:'8px 16px', borderRadius:'4px', cursor:'pointer', fontWeight:'500'}}>Logout</button>
      </nav>
    );

    const Dashboard = ({ onLogout }) => {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [currentStudentId, setCurrentStudentId] = useState(localStorage.getItem('student_id'));

      useEffect(() => {
        setLoading(true);
        fetch(`http://localhost:5000/api/student/${currentStudentId}`)
          .then(res => res.json())
          .then(resData => {
            if (resData.error) throw new Error(resData.error);
            setData(resData);
            setLoading(false);
          })
          .catch(err => { alert(err.message); onLogout(); });
      }, [currentStudentId]);

      useEffect(() => {
        if (!searchQuery) { setSearchResults([]); return; }
        const timer = setTimeout(() => {
          fetch(`http://localhost:5000/api/search?q=${searchQuery}`)
            .then(res => res.json())
            .then(data => setSearchResults(data));
        }, 300);
        return () => clearTimeout(timer);
      }, [searchQuery]);

      if (loading) return <div style={{textAlign:'center', marginTop:'20vh'}}><h2>Loading data...</h2></div>;

      return (
        <div className="dashboard-container fade-in">
          <Navbar 
            searchQuery={searchQuery} setSearchQuery={setSearchQuery} 
            searchResults={searchResults} onLogout={onLogout}
            onResultClick={id => { setCurrentStudentId(id); setSearchQuery(''); setSearchResults([]); }}
          />

          <div className="profile-header google-card">
            <div className="avatar" style={{backgroundColor: data.avatar_color || 'var(--primary)'}}>{data.full_name.charAt(0)}</div>
            <div>
              <h1 style={{fontSize:'24px', fontWeight:'500'}}>{data.full_name}</h1>
              <p style={{color:'var(--text-muted)', fontSize:'14px'}}>ID: {data.student_id} • Class: {data.class}-{data.section} • Roll: {data.roll_no}</p>
            </div>
          </div>

          <div className="dashboard-grid">
            <div>
              <div className="stat-card google-card">
                <div className="stat-icon" style={{color: 'var(--primary)', background: '#e8f0fe'}}>%</div>
                <div>
                  <h3 style={{fontSize:'14px', color:'var(--text-muted)', fontWeight:'500'}}>Overall Percentage</h3>
                  <div style={{fontSize:'28px', color:'var(--text-main)'}}>{data.percentage}%</div>
                </div>
              </div>
              <div className="stat-card google-card">
                <div className="stat-icon" style={{color: '#129eaf', background: '#e4f7fb'}}>📅</div>
                <div>
                  <h3 style={{fontSize:'14px', color:'var(--text-muted)', fontWeight:'500'}}>Attendance</h3>
                  <div style={{fontSize:'28px', color:'var(--text-main)'}}>{data.attendance}%</div>
                  {data.attendance < 75 && <div className="warning-flash">⚠️ Low Attendance Warning</div>}
                </div>
              </div>
            </div>

            <div className="marks-column google-card">
              <h2 style={{fontSize:'18px', fontWeight:'500', marginBottom:'16px'}}>Subject Performance</h2>
              <table className="marks-table">
                <thead><tr><th>Subject</th><th>Marks</th><th>Max</th><th>Status</th></tr></thead>
                <tbody>
                  {data.marks.map((s, i) => (
                    <tr key={i}>
                      <td>{s.subject}</td>
                      <td>
                        <strong>{s.marks}</strong>
                        <div className="progress-bar-bg">
                          <div className="progress-bar-fill" style={{width: `${(s.marks / s.max_marks) * 100}%`, background: s.marks >= 40 ? 'var(--success)' : 'var(--danger)'}}></div>
                        </div>
                      </td>
                      <td>{s.max_marks}</td>
                      <td><span className={`status-pill ${s.status.toLowerCase()}`}>{s.status}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [isAuthenticated, setIsAuthenticated] = useState(!!localStorage.getItem('student_id'));
      return isAuthenticated ? <Dashboard onLogout={() => { localStorage.removeItem('student_id'); setIsAuthenticated(false); }} /> : <Login onLogin={() => setIsAuthenticated(true)} />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
